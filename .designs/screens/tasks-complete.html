<!-- TASKS VIEW — COMPLETE STATE -->

<div class="view-tasks-complete">

  <div class="card" style="border-left: 3px solid var(--color-success); margin-bottom: var(--space-xl); background: rgba(78, 201, 176, 0.04);">
    <div style="display: flex; align-items: center; gap: var(--space-lg);">
      <div style="width: 40px; height: 40px; border-radius: var(--radius-full); background: rgba(78, 201, 176, 0.15); display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
        <i class="codicon codicon-pass-filled" style="font-size: 20px; color: var(--color-success);"></i>
      </div>
      <div>
        <h3 style="margin-bottom: var(--space-xs);">Done.</h3>
        <div style="font-size: var(--font-small-size); color: var(--color-secondary);">
          Integrate Stripe payment processing with idempotency support
        </div>
      </div>
    </div>
  </div>

  <div style="display: flex; gap: var(--space-xl); margin-bottom: var(--space-xl); padding: var(--space-md) 0;">
    <div>
      <div style="font-size: var(--font-h2-size); font-weight: 600; color: var(--color-success);">8/8</div>
      <div style="font-size: var(--font-caption-size); color: var(--color-secondary);">Tasks</div>
    </div>
    <div>
      <div style="font-size: var(--font-h2-size); font-weight: 600;">24</div>
      <div style="font-size: var(--font-caption-size); color: var(--color-secondary);">Tests</div>
    </div>
    <div>
      <div style="font-size: var(--font-h2-size); font-weight: 600;">92%</div>
      <div style="font-size: var(--font-caption-size); color: var(--color-secondary);">Coverage</div>
    </div>
    <div>
      <div style="font-size: var(--font-h2-size); font-weight: 600;">+860</div>
      <div style="font-size: var(--font-caption-size); color: var(--color-secondary);">Lines</div>
    </div>
  </div>

  <div class="card" style="margin-bottom: var(--space-xl);">
    <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: var(--space-md);">
      <span class="card-title" style="font-size: var(--font-small-size);">Plan vs Actual</span>
      <span style="font-size: var(--font-small-size); font-weight: 600; color: var(--color-success);">94% aligned</span>
    </div>
    <div style="display: flex; flex-direction: column; gap: var(--space-sm);">
      <div style="display: flex; align-items: center; gap: var(--space-md); font-size: var(--font-small-size);">
        <i class="codicon codicon-pass-filled" style="color: var(--color-success); font-size: 12px;"></i>
        <span>Data model</span>
        <span style="color: var(--color-secondary); margin-left: auto;">Matches plan (6/6 fields)</span>
      </div>
      <div style="display: flex; align-items: center; gap: var(--space-md); font-size: var(--font-small-size);">
        <i class="codicon codicon-pass-filled" style="color: var(--color-success); font-size: 12px;"></i>
        <span>Endpoints</span>
        <span style="color: var(--color-secondary); margin-left: auto;">Matches plan (3/3 routes)</span>
      </div>
      <div style="display: flex; align-items: center; gap: var(--space-md); font-size: var(--font-small-size);">
        <i class="codicon codicon-warning" style="color: var(--color-warning); font-size: 12px;"></i>
        <span>Security</span>
        <span style="color: var(--color-secondary); margin-left: auto;">Drift: added CORS headers</span>
      </div>
      <div style="display: flex; align-items: center; gap: var(--space-md); font-size: var(--font-small-size);">
        <i class="codicon codicon-pass-filled" style="color: var(--color-success); font-size: 12px;"></i>
        <span>Tests</span>
        <span style="color: var(--color-secondary); margin-left: auto;">24 passing, 92% coverage</span>
      </div>
    </div>
  </div>

  <div style="display: flex; gap: var(--space-md);">
    <button class="btn btn-secondary" onclick="loadScreen('history')">
      <i class="codicon codicon-history"></i> View in History
    </button>
    <button class="btn btn-primary" style="flex: 1;" onclick="loadScreen('tasks-empty')">
      <i class="codicon codicon-add"></i> Archive & Start New
    </button>
  </div>

</div>
